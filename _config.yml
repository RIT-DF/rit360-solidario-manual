title: Bússola Solidária — Manual do Usuário
description: >-
  Manual do usuário do plugin Bússola Solidária: capte doações para a sua OSC
  com WooCommerce, emita recibos, gerencie doadores e cumpra a LGPD.
lang: pt-BR

# Tema como gem (buildado via GitHub Actions — ver .github/workflows/pages.yml).
# Não usar remote_theme: o Pages clássico (Jekyll 3.9) não builda o just-the-docs
# moderno (requer Jekyll 4). Por isso o deploy é por Actions + Gemfile.
theme: just-the-docs
plugins:
  - jekyll-seo-tag

# Busca client-side do just-the-docs.
search_enabled: true
search:
  heading_level: 3
  previews: 3

# Aparência.
color_scheme: light
heading_anchors: true

aux_links:
  "Repositório do plugin":
    - "https://github.com/RIT-DF/BussolaSolidaria"
aux_links_new_tab: true

# Rodapé de cada página.
back_to_top: true
back_to_top_text: "Voltar ao topo"
last_edit_timestamp: true
gh_edit_link: false

footer_content: >-
  Bússola Solidária — <a href="https://rit.org.br">RIT — Rede de Inovação e
  Tecnologia</a>. Conteúdo mantido em <code>docs-publico/</code>.

# Layout padrão para todas as páginas (evita repetir layout na front-matter).
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Não versionar artefatos de build do Jekyll.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - _manual
