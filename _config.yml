title: RIT360 Solidário
description: "Manual do usuário e documentação oficial do RIT360 Solidário — captação de doações para Organizações da Sociedade Civil, pela RIT."
lang: pt-BR
url: https://docs.solidario.rit360.org.br
permalink: pretty

# Tema como gem (buildado via GitHub Actions — ver .github/workflows/pages.yml).
theme: just-the-docs
plugins:
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
    values:
      layout: default

# Tema / cor — esquema RIT360 Solidário (_sass/color_schemes/rit360-solidario.scss).
color_scheme: rit360-solidario
logo: "/assets/logo.png"
image: "/assets/og.png"

# Busca
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true

# Callouts (admonitions)
callouts:
  note:
    title: Nota
    color: blue
  tip:
    title: Dica
    color: green
  warning:
    title: Atenção
    color: yellow
  important:
    title: Importante
    color: red
  example:
    title: Exemplo
    color: purple

# Rodapé
footer_content: '© 2026 <a href="https://rit.org.br" target="_blank" rel="noopener">RIT — Rede de Inovação e Tecnologia</a>. Todos os direitos reservados.'
last_edit_timestamp: false
back_to_top: true
back_to_top_text: "Voltar ao topo"
gh_edit_link: false

# Excluir do build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - _manual
  - README.md
  - "*.sh"
