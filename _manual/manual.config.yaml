projeto: RIT360 Solidário
lang: pt-BR
organizacao:
  eixo: tarefa            # tarefa | modulo
  papeis: [admin, doador]
secoes_fixas:
  novidades: curada       # subconjunto curado do CHANGELOG
  faq: true
  privacidade: proprio    # documentos jurídicos próprios em legal/ (aviso/privacidade/termos/licenca)
  termos: proprio
render:
  target: jekyll          # GitHub Pages builda; tema just-the-docs (gem)
  theme: just-the-docs
  source_root: .          # o próprio manual/ é a fonte e o site publicado
  publish: bin/publish-manual.sh
  repo: RIT-DF/rit360-solidario-manual
  domain: docs.solidario.rit360.org.br
gates: [estrutura, roteiro, draft]
captura:
  viewport: [1920, 1080]  # FullHD (padrão da família)
  assets_dir: assets/img/
notas:
  - "Manual reescrito do zero em 2026-07-15 contra a v2.6.1 (o anterior cobria ~30% e apontava telas inexistentes)."
  - "Prints capturados no dev-wp com dados fictícios (OSC de exemplo 'Instituto Esperança'). Admin logado; front-end sem barra do WordPress."
  - "Front-matter combina just-the-docs (title/parent/nav_order) + contrato docs-keeper (task/role/routes/screenshots/source_docs/last_verified/status)."
